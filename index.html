<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>539 系統下載中心</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #00e676;
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #2962ff;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.1s;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0039cb;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-sub {
            background-color: #ff9100;
        }
        .btn-sub:hover {
            background-color: #c56200;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>539 系統更新中心</h1>
        <p>請點擊下方按鈕下載最新版本的系統檔案，下載後請替換原資料夾內的 index.html</p>
        
        <!-- 使用 download 屬性強制瀏覽器下載而非直接開啟 -->
        <a href="host_index.html" download="index.html" class="btn">下載主機端</a>
        <a href="sub_index.html" download="index.html" class="btn btn-sub">下載子帳號端</a>
        
        <div class="footer">
            System Auto-Update &copy; 2026
        </div>
    </div>
</body>
</html>
